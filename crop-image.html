<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>Crop Image</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f7f8fa;
  color: #333;
  box-sizing: border-box;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  flex-shrink: 0;
  background: #6366f1;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  color: #fff;
  font-size: 1.5rem;
  margin: 0;
}

nav a {
  color: #fff;
  margin-left: 15px;
  text-decoration: none;
  font-weight: 500;
}

nav a:hover {
  text-decoration: underline;
}

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 40px 20px;
}

#drop-zone {
  border: 2px dashed #bbb;
  border-radius: 12px;
  width: 100%;
  max-width: 500px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #fff;
  transition: background-color 0.3s;
  margin-bottom: 20px;
  padding: 20px;
  cursor: pointer;
}

#drop-zone.hover {
  background-color: #e0e7ff;
}

input[type="file"] {
  display: none;
}

canvas {
  border: 2px solid #ccc;
  border-radius: 8px;
  margin-top: 20px;
  max-width: 100%;
  touch-action: none;
}

.controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
select {
  appearance: none;
  -webkit-appearance: none; /* Safari / iOS */
  -moz-appearance: none; /* Firefox */
  background-color: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 1rem;
  cursor: pointer;
  background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5H7z'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px 16px;
  padding-right: 40px; /* Add space for arrow */
}

select:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.4); /* Nice focus ring */
}

option {
  color: #333;
  background: #fff;
}

button, label {
  background-color: #6366f1;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 1rem;
  cursor: pointer;
}

label input {
  margin-left: 8px;
  transform: scale(1.3);
}

button:hover, select:hover {
  background-color: #4f46e5;
}

#canvas.hidden {
  display: none;
}

.aspect-ratio-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
}

.aspect-ratio-group label {
  font-weight: bold;
  margin-bottom: 8px;
  color: #444;
  font-size: 1rem;
}

#aspect-ratio {
  width: 100%;
  max-width: 480px;
}
    .aspect-ratio-title {
  font-weight: bold;
  margin-bottom: 8px;
  color: #333;
  font-size: 1rem;
  text-align: center;
}
</style>

</head>
<body>
  <header>
    <h1>Image Tools</h1>
    <nav>
      <a href="index.html">WebP Converter</a>
      <a href="remove-white-space.html">Remove White Space</a>
      <a href="crop-image.html">Crop Image</a>
    </nav>
  </header>
  <main>
    <h2>Crop Image</h2>
    <div id="drop-zone">Drop image here or click to upload</div>
    <input type="file" id="file-input" accept="image/*">
    <canvas id="canvas"></canvas>
<div class="aspect-ratio-group">
  <div class="aspect-ratio-title">Aspect Ratio</div>
  <select id="aspect-ratio">
        <option value="free">Free</option>
        <option value="original">Original</option>
        <option value="1:1">1:1 Square (Instagram, Profile)</option>
        
        <!-- Social Media -->
        <option disabled>-- Social Media --</option>
        <option value="16:9">16:9 Landscape (YouTube, LinkedIn)</option>
        <option value="9:16">9:16 Portrait (Instagram Stories, TikTok)</option>
        <option value="4:5">4:5 Portrait (Instagram Feed)</option>
        <option value="2:1">2:1 Landscape (Twitter, LinkedIn Banner)</option>
        <option value="3:2">3:2 Landscape (Facebook)</option>
        <option value="3:4">3:4 (Pinterest)</option>
        <option value="8:10">8:10 (Pinterest Pin)</option>
        
        <!-- Ads -->
        <option disabled>-- Ads --</option>
        <option value="1:1.91">1:1.91 Facebook & Instagram Story Ad</option>
        <option value="4:3">4:3 Classic Display Ad</option>
        <option value="1.91:1">1.91:1 Facebook Feed Ad</option>
        <option value="6:19">6:19 Instagram Reel Ad</option>
        <option value="1:2">1:2 Google Display Ads</option>
        
        <!-- Web & Print -->
        <option disabled>-- Web & Print --</option>
        <option value="16:10">16:10 Website Banner</option>
        <option value="3:1">3:1 Website Header</option>
        <option value="21:9">21:9 Ultra-wide Banner</option>
        <option value="4:6">4:6 Flyer</option>
        <option value="1.414:1">1.414:1 A4/Letter (ISO)</option>
      </select>
    </div>
    <div class="controls">
      <label><input type="checkbox" id="lock-aspect" /> Lock Aspect Ratio</label>
      <button id="crop-btn">Crop</button>
      <button id="reset-btn">Reset</button>
      <button id="download-btn">Download</button>
    </div>
  </main>
 <script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cropBtn = document.getElementById('crop-btn');
const resetBtn = document.getElementById('reset-btn');
const downloadBtn = document.getElementById('download-btn');
const aspectRatioSelect = document.getElementById('aspect-ratio');
const lockAspectCheckbox = document.getElementById('lock-aspect');

let image = new Image();
let cropX = 50, cropY = 50, cropW = 200, cropH = 200;
let isDragging = false, isResizing = false;
let dragOffsetX = 0, dragOffsetY = 0;
let activeHandle = null;
let imageLoaded = false;
let aspectRatio = null;
let currentAspectRatio = null;

canvas.classList.add('hidden');

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(image, 0, 0);
  if (!imageLoaded) return;

  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 2]);
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(cropX + (cropW / 3) * i, cropY);
    ctx.lineTo(cropX + (cropW / 3) * i, cropY + cropH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cropX, cropY + (cropH / 3) * i);
    ctx.lineTo(cropX + cropW, cropY + (cropH / 3) * i);
    ctx.stroke();
  }

  ctx.strokeStyle = '#00f0ff';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  ctx.strokeRect(cropX, cropY, cropW, cropH);
  ctx.setLineDash([]);

  const handleSize = 6;
  const handles = [
    [cropX, cropY], [cropX + cropW/2, cropY], [cropX + cropW, cropY],
    [cropX, cropY + cropH/2], [cropX + cropW, cropY + cropH/2],
    [cropX, cropY + cropH], [cropX + cropW/2, cropY + cropH], [cropX + cropW, cropY + cropH]
  ];
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#00f0ff';
  handles.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, handleSize, 0, 2 * Math.PI);
    ctx.fill();
    ctx.stroke();
  });
  
  // Calculate and keep track of current aspect ratio
  currentAspectRatio = cropW / cropH;
}

function getHandle(x, y) {
  const size = 10;
  const handles = [
    [cropX, cropY], [cropX + cropW/2, cropY], [cropX + cropW, cropY],
    [cropX, cropY + cropH/2], [cropX + cropW, cropY + cropH/2],
    [cropX, cropY + cropH], [cropX + cropW/2, cropY + cropH], [cropX + cropW, cropY + cropH]
  ];
  return handles.findIndex(([hx, hy]) => Math.abs(hx - x) < size && Math.abs(hy - y) < size);
}

canvas.addEventListener('mousedown', e => {
  if (!imageLoaded) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;
  const handle = getHandle(x, y);

  if (handle !== -1) {
    isResizing = true;
    activeHandle = handle;
    
    // If aspect ratio is "free" and lock is checked, use current ratio
    if (aspectRatioSelect.value === 'free' && lockAspectCheckbox.checked) {
      aspectRatio = currentAspectRatio;
    }
  } else if (x > cropX && x < cropX + cropW && y > cropY && y < cropY + cropH) {
    isDragging = true;
    dragOffsetX = x - cropX;
    dragOffsetY = y - cropY;
  }
});

canvas.addEventListener('mousemove', e => {
  if (!imageLoaded) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left, y = e.clientY - rect.top;

  if (isDragging) {
    cropX = Math.max(0, Math.min(canvas.width - cropW, x - dragOffsetX));
    cropY = Math.max(0, Math.min(canvas.height - cropH, y - dragOffsetY));
  } else if (isResizing) {
    const min = 20;
    const oldCropX = cropX, oldCropY = cropY;
    const oldCropW = cropW, oldCropH = cropH;
    
    switch (activeHandle) {
      case 0: cropW += cropX - x; cropH += cropY - y; cropX = x; cropY = y; break;
      case 1: cropH += cropY - y; cropY = y; break;
      case 2: cropW = x - cropX; cropH += cropY - y; cropY = y; break;
      case 3: cropW += cropX - x; cropX = x; break;
      case 4: cropW = x - cropX; break;
      case 5: cropW += cropX - x; cropX = x; cropH = y - cropY; break;
      case 6: cropH = y - cropY; break;
      case 7: cropW = x - cropX; cropH = y - cropY; break;
    }
    
    cropW = Math.max(min, cropW);
    cropH = Math.max(min, cropH);
    
    // Maintain aspect ratio if locked
    if (lockAspectCheckbox.checked && aspectRatio) {
      // Identify which dimension changed most
      const widthChangedMore = Math.abs(cropW - oldCropW) > Math.abs(cropH - oldCropH);
      
      if (widthChangedMore) {
        cropH = cropW / aspectRatio;
      } else {
        cropW = cropH * aspectRatio;
      }
      
      // Adjust position for corner handles to maintain expected behavior
      if (activeHandle === 0) {
        if (widthChangedMore) cropY = oldCropY + oldCropH - cropH;
        else cropX = oldCropX + oldCropW - cropW;
      } else if (activeHandle === 2) {
        if (!widthChangedMore) cropY = oldCropY + oldCropH - cropH;
      } else if (activeHandle === 5) {
        if (!widthChangedMore) cropX = oldCropX + oldCropW - cropW;
      }
    }
    
    // Ensure crop box stays within image bounds
    if (cropX < 0) {
      cropW += cropX;
      cropX = 0;
    }
    if (cropY < 0) {
      cropH += cropY;
      cropY = 0;
    }
    if (cropX + cropW > canvas.width) {
      cropW = canvas.width - cropX;
    }
    if (cropY + cropH > canvas.height) {
      cropH = canvas.height - cropY;
    }
  }
  draw();
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  isResizing = false;
});

// Also handle mouse leaving the canvas
canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  isResizing = false;
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    image.onload = () => {
      canvas.classList.remove('hidden');
      canvas.width = image.width;
      canvas.height = image.height;
      cropW = image.width / 2;
      cropH = image.height / 2;
      cropX = (image.width - cropW) / 2;
      cropY = (image.height - cropH) / 2;
      imageLoaded = true;
      currentAspectRatio = cropW / cropH;
      draw();
    };
    image.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('hover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('hover');
  handleFile(e.dataTransfer.files[0]);
});

cropBtn.addEventListener('click', () => {
  if (!imageLoaded) return;

  // Create a temporary canvas
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = cropW;
  tempCanvas.height = cropH;
  const tempCtx = tempCanvas.getContext('2d');

  // Draw from the original image into temp canvas
  tempCtx.drawImage(
    image,
    cropX, cropY, cropW, cropH,   // source rectangle
    0, 0, cropW, cropH            // destination rectangle
  );

  // Now replace the main canvas with the cropped result
  canvas.width = cropW;
  canvas.height = cropH;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(tempCanvas, 0, 0);

  // Important: Reset state
  image.src = tempCanvas.toDataURL();  // Update the image to the cropped version
  imageLoaded = true;

  // Clear the crop box
  cropX = 0;
  cropY = 0;
  cropW = canvas.width;
  cropH = canvas.height;
  currentAspectRatio = cropW / cropH;

  // Modify draw() so it only draws the image if cropX == 0
  draw = function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
    // No crop box anymore after crop
  };
});

resetBtn.addEventListener('click', () => {
  if (!image.src) return;
  image.onload();
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'cropped-image.png';
  link.href = canvas.toDataURL();
  link.click();
});

aspectRatioSelect.addEventListener('change', () => {
  const val = aspectRatioSelect.value;
  if (val === 'free') {
    // If free mode and lock is checked, use current ratio
    if (lockAspectCheckbox.checked) {
      aspectRatio = currentAspectRatio;
    } else {
      aspectRatio = null;
    }
  }
  else if (val === 'original') {
    aspectRatio = image.width / image.height;
  }
  else {
    const ratioStr = val.split(' ')[0]; // Get just the ratio part before any description
    const [w, h] = ratioStr.split(':').map(Number);
    aspectRatio = w / h;
  }
  
  // Apply the new aspect ratio to current crop
  if (aspectRatio && lockAspectCheckbox.checked) {
    // Keep the center position, adjust width/height
    const centerX = cropX + cropW/2;
    const centerY = cropY + cropH/2;
    
    // Try to keep width constant and adjust height
    cropH = cropW / aspectRatio;
    
    // If too tall, adjust width instead
    if (cropY + cropH > canvas.height) {
      cropH = Math.min(cropH, canvas.height - cropY);
      cropW = cropH * aspectRatio;
    }
    
    // Recenter
    cropX = centerX - cropW/2;
    cropY = centerY - cropH/2;
    
    // Ensure within bounds
    cropX = Math.max(0, Math.min(cropX, canvas.width - cropW));
    cropY = Math.max(0, Math.min(cropY, canvas.height - cropH));
    
    draw();
  }
});

// Handle lock aspect ratio checkbox change
lockAspectCheckbox.addEventListener('change', () => {
  if (lockAspectCheckbox.checked) {
    // If in free mode, use the current aspect ratio
    if (aspectRatioSelect.value === 'free') {
      aspectRatio = currentAspectRatio;
    } else {
      // Otherwise use the selected ratio
      aspectRatioSelect.dispatchEvent(new Event('change'));
    }
  } else {
    // Only set to null if in free mode
    if (aspectRatioSelect.value === 'free') {
      aspectRatio = null;
    }
  }
});
</script>
</body>
</html>
